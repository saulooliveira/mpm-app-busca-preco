name: CI/CD

on:
  pull_request:
    branches: [develop]
    types: [opened, synchronize, reopened]
  push:
    branches: [develop]

permissions:
  contents: write

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: ${{ github.event_name == 'pull_request' }}

jobs:

  # ───────────────────────────────────────────────────────────────────────────
  # JOB 1 — Build and Test
  # Roda em todo PR (opened / synchronize / reopened) e em todo push a develop.
  # ───────────────────────────────────────────────────────────────────────────
  build_test:
    name: Build and Test
    runs-on: windows-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '8.0.x'

      - uses: actions/cache@v4
        with:
          path: ~/.nuget/packages
          key: nuget-${{ runner.os }}-${{ hashFiles('**/*.csproj') }}
          restore-keys: nuget-${{ runner.os }}-

      - name: Restore
        run: dotnet restore BuscaPreco.sln

      - name: Build
        run: dotnet build BuscaPreco.sln --configuration Release --no-restore

      - name: Test
        run: dotnet test BuscaPreco.sln --configuration Release --no-build --verbosity normal

  # ───────────────────────────────────────────────────────────────────────────
  # JOB 2 — Release
  # Roda apenas em push a develop (ou seja, quando um PR é mergeado).
  # 1. Lê o arquivo VERSION, cria a tag vX.Y.Z e incrementa para o próximo ciclo.
  # 2. Publica o binário self-contained win-x64.
  # 3. Cria a GitHub Release com o zip gerado.
  # ───────────────────────────────────────────────────────────────────────────
  release:
    name: Release
    runs-on: windows-latest
    needs: build_test
    if: github.event_name == 'push' && github.ref == 'refs/heads/develop'
    timeout-minutes: 30
    steps:
      - name: Generate GitHub App token
        id: app_token
        uses: actions/create-github-app-token@v1
        with:
          app-id: ${{ secrets.APP_ID }}
          private-key: ${{ secrets.APP_PRIVATE_KEY }}

      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ steps.app_token.outputs.token }}

      - uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '8.0.x'

      - uses: actions/cache@v4
        with:
          path: ~/.nuget/packages
          key: nuget-${{ runner.os }}-${{ hashFiles('**/*.csproj') }}
          restore-keys: nuget-${{ runner.os }}-

      - name: Tag and bump VERSION
        id: tag
        shell: pwsh
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git fetch --tags --force

          $raw = (Get-Content VERSION -Raw).Trim()
          if ($raw -notmatch '^(\d+)\.(\d+)\.(\d+)$') {
            Write-Error "VERSION inválido: '$raw'. Esperado MAJOR.MINOR.PATCH."; exit 1
          }
          $tag = "v$raw"

          if (git tag -l $tag) {
            Write-Host "Tag $tag já existe — pulando criação."
          } else {
            git tag $tag
            git push origin $tag
            Write-Host "Tag $tag criada."
          }
          "tag=$tag" | Out-File -FilePath $env:GITHUB_OUTPUT -Encoding utf8 -Append

          # Incrementa patch e grava próxima versão no arquivo VERSION
          $major = [int]$Matches[1]; $minor = [int]$Matches[2]; $patch = [int]$Matches[3] + 1
          if ($patch -ge 100) { $patch = 0; $minor++ }
          if ($minor -ge 10)  { $minor = 0; $major++ }
          $next = "$major.$minor.$patch"
          $next | Out-File VERSION -Encoding utf8 -NoNewline
          git add VERSION
          $diff = git diff --cached --name-only
          if ($diff) {
            git commit -m "chore(version): bump VERSION to $next [skip ci]"
            git push origin HEAD:develop
            Write-Host "VERSION → $next"
          } else {
            Write-Host "VERSION não mudou — nenhum commit necessário."
          }

      - name: Restore packages (win-x64)
        run: dotnet restore BuscaPreco/BuscaPreco.csproj --runtime win-x64

      - name: Publish self-contained binary (win-x64)
        run: |
          dotnet publish BuscaPreco/BuscaPreco.csproj `
            --configuration Release `
            --runtime win-x64 `
            --self-contained true `
            --no-restore `
            -p:PublishSingleFile=true `
            -p:IncludeNativeLibrariesForSelfExtract=true `
            -p:EnableCompressionInSingleFile=true `
            -p:DebugType=none `
            -p:DebugSymbols=false `
            --output ./publish/win-x64

      - name: Package
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Force -Path artifacts | Out-Null

          $staging = "staging_win_x64"
          New-Item -ItemType Directory -Path $staging -Force | Out-Null
          Copy-Item -Path "./publish/win-x64/*" -Destination $staging -Recurse -Force

          @("*.pdb","*.xml","*.log","*.sqlite","*.dbf","appsettings.Development.json","config.yaml") | ForEach-Object {
            Get-ChildItem -Path $staging -Filter $_ -Recurse |
              Remove-Item -Force -ErrorAction SilentlyContinue
          }

          if (-not (Test-Path "$staging/config.example.yaml")) {
            Copy-Item -Path "./BuscaPreco/config.example.yaml" -Destination $staging `
              -Force -ErrorAction SilentlyContinue
          }

          Compress-Archive `
            -Path "$staging/*" `
            -DestinationPath "./artifacts/BuscaPreco-${{ steps.tag.outputs.tag }}-win-x64.zip" `
            -Force

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.tag.outputs.tag }}
          files: ./artifacts/BuscaPreco-${{ steps.tag.outputs.tag }}-win-x64.zip
          generate_release_notes: true
