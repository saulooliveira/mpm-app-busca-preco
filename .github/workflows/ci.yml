name: BuscaPreco CI/CD

on:
  push:
    branches:
      - 'feature/**'
      - 'release/**'
      - main
      - master
    tags:
      - 'v*'
  pull_request:
    branches:
      - develop
    types: [opened, synchronize, reopened, closed]

permissions:
  contents: write
  pull-requests: write

jobs:
  build_test:
    name: Build and Test (.NET 8)
    runs-on: windows-latest
    if: |
      startsWith(github.ref, 'refs/heads/feature/') ||
      startsWith(github.ref, 'refs/heads/release/') ||
      github.ref == 'refs/heads/main' ||
      github.ref == 'refs/heads/master' ||
      (github.event_name == 'pull_request' && github.event.pull_request.base.ref == 'develop')
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '8.0.x'

      - name: Restore
        run: dotnet restore BuscaPreco.sln

      - name: Build
        run: dotnet build BuscaPreco.sln --configuration Release --no-restore

      - name: Test
        run: dotnet test BuscaPreco.sln --configuration Release --no-build --verbosity normal

  security_scan_and_release_pr:
    name: Security Scan + Open PR develop -> release/*
    runs-on: windows-latest
    needs: build_test
    if: |
      github.event_name == 'pull_request' &&
      github.event.pull_request.base.ref == 'develop' &&
      github.event.action == 'closed' &&
      github.event.pull_request.merged == true
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Simulated security scan
        run: echo "[SECURITY SCAN] Running SAST/dependency checks (simulado)."

      - name: Prepare release branch name from date
        id: release_branch
        shell: pwsh
        run: |
          $name = "release/" + (Get-Date -Format "yyyy.MM.dd")
          "name=$name" | Out-File -FilePath $env:GITHUB_OUTPUT -Encoding utf8 -Append

      - name: Ensure GitHub CLI auth
        shell: pwsh
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: gh auth status

      - name: Create release branch (if not exists)
        shell: pwsh
        run: |
          $branch = "${{ steps.release_branch.outputs.name }}"
          git fetch origin --prune
          $remoteBranch = git ls-remote --heads origin $branch
          if (-not $remoteBranch) {
            git checkout -b $branch origin/develop
            git push origin $branch
          }

      - name: Create PR develop -> release
        shell: pwsh
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          $branch = "${{ steps.release_branch.outputs.name }}"
          gh pr create --base $branch --head develop --title "chore(release): promote develop to $branch" --body "PR automática criada após merge em develop."

  tag_release:
    name: Auto-increment tag v0.0.* on main/master
    runs-on: windows-latest
    needs: build_test
    if: |
      github.event_name == 'push' &&
      (github.ref == 'refs/heads/main' || github.ref == 'refs/heads/master')
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Create next tag (v0.0.*)
        shell: pwsh
        run: |
          git fetch --tags --force

          $existingTags = git tag -l "v0.0.*"
          $maxPatch = 0

          foreach ($tag in $existingTags) {
            if ($tag -match '^v0\.0\.(\d+)$') {
              $patch = [int]$matches[1]
              if ($patch -gt $maxPatch) {
                $maxPatch = $patch
              }
            }
          }

          $nextPatch = $maxPatch + 1
          $newTag = "v0.0.$nextPatch"

          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

          Write-Host "Creating tag $newTag"
          git tag $newTag
          git push origin $newTag

  publish_release:
    name: Publish win-x64 and create GitHub Release
    runs-on: windows-latest
    if: startsWith(github.ref, 'refs/tags/v')
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '8.0.x'

      - name: Publish self-contained binary (win-x64)
        run: |
          dotnet restore BuscaPreco.sln
          dotnet publish BuscaPreco/BuscaPreco.csproj --configuration Release --runtime win-x64 --self-contained true --output ./publish/win-x64

      - name: Package published output
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Force -Path artifacts | Out-Null
          Compress-Archive -Path ./publish/win-x64/* -DestinationPath ./artifacts/BuscaPreco-${{ github.ref_name }}-win-x64.zip -Force

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: ./artifacts/BuscaPreco-${{ github.ref_name }}-win-x64.zip
          generate_release_notes: true
